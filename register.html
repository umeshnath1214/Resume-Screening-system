<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Register — ResumeAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        :root { --bg:#0d0f14;--surface:#161a23;--card:#1e2330;--border:#2a3044;--accent:#4f8ef7;--red:#f76b6b;--green:#22d3a2;--text:#e8ecf5;--muted:#7a8399;--mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;}
        .wrap{width:100%;max-width:400px;padding:24px;}
        .brand{text-align:center;margin-bottom:32px;}
        .brand-logo{font-family:var(--mono);font-size:1.6rem;font-weight:700;color:var(--accent);}
        .brand-sub{font-size:0.8rem;color:var(--muted);margin-top:4px;}
        .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;}
        .card-title{font-family:var(--mono);font-size:0.85rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:24px;}
        .form-group{margin-bottom:18px;}
        label{display:block;font-size:0.8rem;color:var(--muted);margin-bottom:6px;font-weight:500;}
        input,select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-family:var(--sans);font-size:0.875rem;outline:none;transition:border-color .2s;}
        input:focus,select:focus{border-color:var(--accent);}
        .btn{width:100%;padding:11px;border-radius:8px;border:none;cursor:pointer;font-family:var(--sans);font-size:0.9rem;font-weight:600;background:var(--accent);color:white;transition:background .15s;}
        .btn:hover{background:#3b79e8;}
        .link{display:block;text-align:center;margin-top:16px;font-size:0.8rem;color:var(--muted);text-decoration:none;}
        .link span{color:var(--accent);}
        .alert{padding:10px 14px;border-radius:8px;margin-bottom:18px;font-size:0.82rem;background:rgba(247,107,107,.12);color:var(--red);border:1px solid rgba(247,107,107,.3);}
        .alert.success{background:rgba(34,211,162,.12);color:var(--green);border-color:rgba(34,211,162,.3);}
    </style>
</head>
<body>
<div class="wrap">
    <div class="brand">
        <div class="brand-logo">▲ ResumeAI</div>
        <div class="brand-sub">Create your account</div>
    </div>
    <div class="card">
        <div class="card-title">// Register</div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in messages %}
                <div class="alert {% if cat=='success' %}success{% endif %}">{{ msg }}</div>
            {% endfor %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Choose a username"/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Create a password"/>
            </div>
            <div class="form-group">
                <label>Role</label>
                <select name="role">
                    <option value="recruiter">Recruiter</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button class="btn" type="submit">Create Account →</button>
        </form>
        <a href="{{ url_for('login') }}" class="link">Already have an account? <span>Sign in</span></a>
    </div>
</div>
</body>
</html>
